name: Update README

on:
  project_card:
  push:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

jobs:
  markscribe:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Generate README
        uses: muesli/readme-scribe@master   
        env:
          # ✨ FIXED: Changed key from GITHUB_TOKEN to PERSONAL_GITHUB_TOKEN
          PERSONAL_GITHUB_TOKEN: ${{ secrets.GH_PAT }} 
        with:
          template: README.gtpl
          writeTo: README.md

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update dynamic github statistics"
          file_pattern: "README.md"
          # ✨ OPTIONAL: Explicitly fallback to GitHub's automation identity
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
